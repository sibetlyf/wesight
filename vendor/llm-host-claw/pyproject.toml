[project]
name = "llm-host-claw"
version = "0.1.0"
description = "Sandbox running agent using agno (python)"
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "agno==2.5.15",
    "loguru>=0.7.3",
    "mcp>=1.26.0",
    "motor>=3.7.1",
    "networkx==3.6.1",
    "openai>=2.24.0",
    "pydantic",
    "pydantic-settings",
    "pymongo>=4.16.0",
    "pyxdg>=0.28",
    "sqlalchemy>=2.0.48",
    "python-docx>=1.2.0",
    "pytesseract>=0.3.10",
    "python-pptx>=1.0.2",
    "pypdf>=6.9.0",
    "pdfplumber>=0.11.8",
    "pandoc",
    "pdf2image",
    "pixabay",
    "pdfminer-six",
    "openpyxl",
    "pandas",
    "markitdown",
    "Pillow",
    "poppler-utils",
    "aiosqlite>=0.22.1",
    "greenlet>=3.3.2",
    "fastapi>=0.135.1",
    "openinference-instrumentation-agno>=0.1.29",
    "opentelemetry-exporter-otlp>=1.40.0",
    "browser-use>=0.11.13",
    "tokenizers>=0.22.2",
    "tiktoken>=0.12.0",
    "mistralai>=1.12.4",
    "playwright>=1.55.0",
    "litellm>=1.78.0",
    "langchain-openai>=0.2.0",
    "python-dotenv>=1.0.1",
    "httpx>=0.27.0",
    "tenacity>=8.2.0",
    "aiofiles>=25.1.0",
    "svglib>=1.5.0",
    "reportlab>=4.0.0",
    "PyMuPDF>=1.23.0",
    "beautifulsoup4>=4.12.0",
]

[project.scripts]
moma = "moma_cli.__main__:main"

[build-system]
requires = ["setuptools>=69", "wheel"]
build-backend = "setuptools.build_meta"

[tool.setuptools]
package-dir = {"" = "src"}

[tool.setuptools.packages.find]
where = ["src"]
include = ["moma_cli*", "configs*", "core*", "protocol*", "lib*"]

[project.optional-dependencies]
dev = [
    "pytest>=9.0.2",
    "pytest-asyncio>=1.3.0",
    "pytest-html>=4.2.0",
    "ruff>=0.15.4",
]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src"]
addopts = "--html=.cache/pytest/test_report.html --capture=sys"

[tool.ruff]
select = ["E", "F"]
line-length = 88

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
