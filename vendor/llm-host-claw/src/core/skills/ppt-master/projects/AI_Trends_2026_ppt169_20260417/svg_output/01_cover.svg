<svg viewBox="0 0 1280 720" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e3a5f;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0066cc;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="1280" height="720" fill="url(#bgGradient)"/>
  
  <!-- Decorative Grid -->
  <g opacity="0.1">
    <defs>
      <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
        <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ffffff" stroke-width="0.5"/>
      </pattern>
    </defs>
    <rect width="1280" height="720" fill="url(#grid)"/>
  </g>
  
  <!-- Neural Network Decoration -->
  <g opacity="0.2" stroke="url(#accentGradient)" stroke-width="1" fill="none">
    <circle cx="200" cy="150" r="3" fill="#00d4ff"/>
    <circle cx="400" cy="100" r="3" fill="#00d4ff"/>
    <circle cx="600" cy="180" r="3" fill="#00d4ff"/>
    <circle cx="300" cy="250" r="3" fill="#00d4ff"/>
    <line x1="200" y1="150" x2="400" y2="100"/>
    <line x1="400" y1="100" x2="600" y2="180"/>
    <line x1="300" y1="250" x2="400" y2="100"/>
    <line x1="200" y1="150" x2="300" y2="250"/>
  </g>
  
  <!-- Main Title -->
  <text x="640" y="280" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="56" font-weight="bold" fill="#ffffff" filter="url(#glow)">
    2026 年人工智能发展趋势
  </text>
  
  <!-- Subtitle -->
  <text x="640" y="340" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="28" fill="#94a3b8" font-weight="300">
    面向企业决策者的战略洞察
  </text>
  
  <!-- Accent Line -->
  <rect x="440" y="365" width="400" height="4" rx="2" fill="url(#accentGradient)"/>
  
  <!-- Footer Info -->
  <g transform="translate(640, 620)">
    <text text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#64748b">
      Strategic Insights for Enterprise Leaders
    </text>
    <text x="0" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#475569">
      2026
    </text>
  </g>
  
  <!-- Corner Decoration -->
  <rect x="0" y="0" width="150" height="150" fill="url(#accentGradient)" opacity="0.1"/>
  <rect x="1130" y="570" width="150" height="150" fill="url(#accentGradient)" opacity="0.1"/>
</svg>
