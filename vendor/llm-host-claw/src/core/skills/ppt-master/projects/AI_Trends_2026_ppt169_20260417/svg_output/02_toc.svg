<svg viewBox="0 0 1280 720" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f8fafc;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e2e8f0;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0066cc;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00d4ff;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1280" height="720" fill="url(#bgGradient)"/>
  
  <!-- Header Bar -->
  <rect x="0" y="0" width="1280" height="120" fill="#1e3a5f"/>
  <text x="60" y="75" font-family="Microsoft YaHei, Arial, sans-serif" font-size="24" fill="#ffffff" font-weight="500">
    2026 AI Development Trends
  </text>
  
  <!-- Title -->
  <text x="640" y="180" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="42" font-weight="bold" fill="#1e3a5f">
    目录 / CONTENTS
  </text>
  
  <!-- Content Boxes -->
  <g transform="translate(180, 240)">
    <!-- Box 1 -->
    <rect x="0" y="0" width="420" height="140" rx="8" fill="#ffffff" filter="drop-shadow(0 4px 6px rgba(0,0,0,0.1))"/>
    <rect x="0" y="0" width="6" height="140" rx="3" fill="url(#accentGradient)"/>
    <text x="30" y="45" font-family="Microsoft YaHei, Arial, sans-serif" font-size="28" font-weight="bold" fill="#1e3a5f">01</text>
    <text x="30" y="85" font-family="Microsoft YaHei, Arial, sans-serif" font-size="20" fill="#475569">大模型进化方向</text>
    <text x="30" y="115" font-family="Arial, sans-serif" font-size="14" fill="#94a3b8">LLM Evolution</text>
  </g>
  
  <g transform="translate(680, 240)">
    <!-- Box 2 -->
    <rect x="0" y="0" width="420" height="140" rx="8" fill="#ffffff" filter="drop-shadow(0 4px 6px rgba(0,0,0,0.1))"/>
    <rect x="0" y="0" width="6" height="140" rx="3" fill="url(#accentGradient)"/>
    <text x="30" y="45" font-family="Microsoft YaHei, Arial, sans-serif" font-size="28" font-weight="bold" fill="#1e3a5f">02</text>
    <text x="30" y="85" font-family="Microsoft YaHei, Arial, sans-serif" font-size="20" fill="#475569">多模态 AI 应用</text>
    <text x="30" y="115" font-family="Arial, sans-serif" font-size="14" fill="#94a3b8">Multimodal AI</text>
  </g>
  
  <g transform="translate(180, 420)">
    <!-- Box 3 -->
    <rect x="0" y="0" width="420" height="140" rx="8" fill="#ffffff" filter="drop-shadow(0 4px 6px rgba(0,0,0,0.1))"/>
    <rect x="0" y="0" width="6" height="140" rx="3" fill="url(#accentGradient)"/>
    <text x="30" y="45" font-family="Microsoft YaHei, Arial, sans-serif" font-size="28" font-weight="bold" fill="#1e3a5f">03</text>
    <text x="30" y="85" font-family="Microsoft YaHei, Arial, sans-serif" font-size="20" fill="#475569">AI 与行业融合</text>
    <text x="30" y="115" font-family="Arial, sans-serif" font-size="14" fill="#94a3b8">Industry Integration</text>
  </g>
  
  <g transform="translate(680, 420)">
    <!-- Box 4 -->
    <rect x="0" y="0" width="420" height="140" rx="8" fill="#ffffff" filter="drop-shadow(0 4px 6px rgba(0,0,0,0.1))"/>
    <rect x="0" y="0" width="6" height="140" rx="3" fill="url(#accentGradient)"/>
    <text x="30" y="45" font-family="Microsoft YaHei, Arial, sans-serif" font-size="28" font-weight="bold" fill="#1e3a5f">04</text>
    <text x="30" y="85" font-family="Microsoft YaHei, Arial, sans-serif" font-size="20" fill="#475569">边缘 AI 部署</text>
    <text x="30" y="115" font-family="Arial, sans-serif" font-size="14" fill="#94a3b8">Edge AI</text>
  </g>
  
  <g transform="translate(180, 600)">
    <!-- Box 5 -->
    <rect x="0" y="0" width="420" height="80" rx="8" fill="#ffffff" filter="drop-shadow(0 4px 6px rgba(0,0,0,0.1))"/>
    <rect x="0" y="0" width="6" height="80" rx="3" fill="url(#accentGradient)"/>
    <text x="30" y="35" font-family="Microsoft YaHei, Arial, sans-serif" font-size="24" font-weight="bold" fill="#1e3a5f">05</text>
    <text x="85" y="50" font-family="Microsoft YaHei, Arial, sans-serif" font-size="20" fill="#475569">AI 安全与治理</text>
  </g>
  
  <g transform="translate(680, 600)">
    <!-- Box 6 -->
    <rect x="0" y="0" width="420" height="80" rx="8" fill="#ffffff" filter="drop-shadow(0 4px 6px rgba(0,0,0,0.1))"/>
    <rect x="0" y="0" width="6" height="80" rx="3" fill="url(#accentGradient)"/>
    <text x="30" y="35" font-family="Microsoft YaHei, Arial, sans-serif" font-size="24" font-weight="bold" fill="#1e3a5f">06</text>
    <text x="85" y="50" font-family="Microsoft YaHei, Arial, sans-serif" font-size="20" fill="#475569">投资与市场展望</text>
  </g>
</svg>
