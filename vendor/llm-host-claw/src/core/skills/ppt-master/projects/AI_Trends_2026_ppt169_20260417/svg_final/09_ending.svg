<svg viewBox="0 0 1280 720" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e3a5f;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0066cc;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1280" height="720" fill="url(#bgGradient)"/>
  
  <!-- Decorative Elements -->
  <circle cx="1200" cy="100" r="200" fill="#0066cc" opacity="0.1"/>
  <circle cx="100" cy="620" r="150" fill="#00d4ff" opacity="0.1"/>
  
  <!-- Main Title -->
  <text x="640" y="260" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="52" font-weight="bold" fill="#ffffff">
    关键洞察
  </text>
  
  <!-- Subtitle -->
  <text x="640" y="320" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" fill="#94a3b8">
    KEY INSIGHTS & TAKEAWAYS
  </text>
  
  <!-- Accent Line -->
  <rect x="440" y="350" width="400" height="4" rx="2" fill="url(#accentGradient)"/>
  
  <!-- Key Points -->
  <g transform="translate(340, 400)">
    <text x="0" y="0" font-family="Microsoft YaHei, Arial, sans-serif" font-size="20" fill="#ffffff" text-anchor="middle">
      AI 已不再是未来技术 — 它是当下竞争优势的核心驱动力
    </text>
    <text x="0" y="45" font-family="Microsoft YaHei, Arial, sans-serif" font-size="18" fill="#94a3b8" text-anchor="middle">
      AI is no longer future technology — it's the core driver of competitive advantage today
    </text>
  </g>
  
  <!-- Stats -->
  <g transform="translate(200, 500)">
    <text x="0" y="0" text-anchor="middle" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill="#00d4ff">$4.8T</text>
    <text x="0" y="35" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#94a3b8">2026 全球 AI 市场规模</text>
  </g>
  
  <g transform="translate(640, 500)">
    <text x="0" y="0" text-anchor="middle" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill="#00d4ff">75%</text>
    <text x="0" y="35" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#94a3b8">企业将 AI 纳入核心战略</text>
  </g>
  
  <g transform="translate(1080, 500)">
    <text x="0" y="0" text-anchor="middle" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill="#00d4ff">10x</text>
    <text x="0" y="35" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#94a3b8">AI 投资回报率</text>
  </g>
  
  <!-- Call to Action -->
  <rect x="240" y="590" width="800" height="80" rx="12" fill="url(#accentGradient)" opacity="0.2"/>
  <text x="640" y="625" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="22" font-weight="bold" fill="#ffffff">
    现在行动，引领变革
  </text>
  <text x="640" y="655" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#94a3b8">
    Act now, lead the transformation
  </text>
  
  <!-- Page Number -->
  <text x="1220" y="700" text-anchor="end" font-family="Arial, sans-serif" font-size="14" fill="#64748b">9 / 10</text>
</svg>
