<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a5f;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f172a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0066cc;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  
  <rect width="1280" height="720" fill="url(#bgGradient)" />
  
  
  <rect x="0" y="0" width="1280" height="80" fill="#0f172a" />
  <text x="60" y="52" font-family="Microsoft YaHei, Arial, sans-serif" font-size="28" fill="#ffffff" font-weight="500">
    2026 AI Development Trends
  </text>
  
  
  <text x="640" y="180" text-anchor="middle" font-family="Arial, sans-serif" font-size="120" font-weight="bold" fill="#1e3a5f" opacity="0.3">01</text>
  
  
  <text x="640" y="240" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="48" font-weight="bold" fill="#ffffff">
    大模型进化方向
  </text>
  <text x="640" y="290" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" fill="#94a3b8">
