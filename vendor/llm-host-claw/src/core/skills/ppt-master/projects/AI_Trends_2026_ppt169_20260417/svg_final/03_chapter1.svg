    <text x="120" y="60" font-family="Microsoft YaHei, Arial, sans-serif" font-size="24" font-weight="bold" fill="#ffffff">高效小型化</text>
    <text x="120" y="95" font-family="Arial, sans-serif" font-size="16" fill="#94a3b8">Smaller, more efficient models with better performance</text>
    
    
