  </text>
  
  
  <path fill="url(#accentGradient)" d="M442,320 H838 A2,2 0 0 1 840,322 V322 A2,2 0 0 1 838,324 H442 A2,2 0 0 1 440,322 V322 A2,2 0 0 1 442,320 Z" />
  
  
  <g transform="translate(200, 380)">
