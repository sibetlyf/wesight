    <text x="80" y="258" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#00d4ff">3</text>
    <text x="120" y="240" font-family="Microsoft YaHei, Arial, sans-serif" font-size="24" font-weight="bold" fill="#ffffff">推理能力增强</text>
