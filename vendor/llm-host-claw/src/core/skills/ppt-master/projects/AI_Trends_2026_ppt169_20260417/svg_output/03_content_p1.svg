<svg viewBox="0 0 1280 720" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f8fafc;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Header -->
  <rect width="1280" height="100" fill="url(#headerGrad)"/>
  <text x="80" y="55" fill="#ffffff" font-family="Microsoft YaHei, sans-serif" font-size="36" font-weight="bold">
    大模型进化方向
  </text>
  <rect x="80" y="70" width="80" height="4" fill="#00d4ff" rx="2"/>
  
  <!-- Content Cards -->
  <g transform="translate(80, 150)">
    <!-- Card 1 -->
    <g>
      <rect x="0" y="0" width="340" height="160" rx="12" fill="url(#cardGrad)" stroke="#e2e8f0" stroke-width="2"/>
      <rect x="0" y="0" width="340" height="12" rx="12" fill="#0066cc"/>
      <rect x="0" y="8" width="340" height="152" rx="12" fill="none" stroke="#e2e8f0" stroke-width="2"/>
      
      <text x="170" y="60" text-anchor="middle" fill="#1f2937" font-family="Microsoft YaHei, sans-serif" font-size="22" font-weight="bold">小型化与高效化</text>
      <text x="170" y="95" text-anchor="middle" fill="#6b7280" font-family="Microsoft YaHei, sans-serif" font-size="14">
        参数量减少 90%
      </text>
      <text x="170" y="120" text-anchor="middle" fill="#6b7280" font-family="Microsoft YaHei, sans-serif" font-size="14">
        推理成本降低 80%
      </text>
    </g>
    
    <!-- Card 2 -->
    <g transform="translate(380, 0)">
      <rect x="0" y="0" width="340" height="160" rx="12" fill="url(#cardGrad)" stroke="#e2e8f0" stroke-width="2"/>
      <rect x="0" y="0" width="340" height="12" rx="12" fill="#00d4ff"/>
      <rect x="0" y="8" width="340" height="152" rx="12" fill="none" stroke="#e2e8f0" stroke-width="2"/>
      
      <text x="170" y="60" text-anchor="middle" fill="#1f2937" font-family="Microsoft YaHei, sans-serif" font-size="22" font-weight="bold">领域专用模型</text>
      <text x="170" y="95" text-anchor="middle" fill="#6b7280" font-family="Microsoft YaHei, sans-serif" font-size="14">
        金融、医疗、法律垂直化
      </text>
      <text x="170" y="120" text-anchor="middle" fill="#6b7280" font-family="Microsoft YaHei, sans-serif" font-size="14">
        准确率提升 40%+
      </text>
    </g>
    
    <!-- Card 3 -->
    <g transform="translate(760, 0)">
      <rect x="0" y="0" width="340" height="160" rx="12" fill="url(#cardGrad)" stroke="#e2e8f0" stroke-width="2"/>
      <rect x="0" y="0" width="340" height="12" rx="12" fill="#1a1a2e"/>
      <rect x="0" y="8" width="340" height="152" rx="12" fill="none" stroke="#e2e8f0" stroke-width="2"/>
      
      <text x="170" y="60" text-anchor="middle" fill="#1f2937" font-family="Microsoft YaHei, sans-serif" font-size="22" font-weight="bold">推理能力强化</text>
      <text x="170" y="95" text-anchor="middle" fill="#6b7280" font-family="Microsoft YaHei, sans-serif" font-size="14">
        多步逻辑推理
      </text>
      <text x="170" y="120" text-anchor="middle" fill="#6b7280" font-family="Microsoft YaHei, sans-serif" font-size="14">
        数学与科学问题解决
      </text>
    </g>
  </g>
  
  <!-- Key Statistics -->
  <g transform="translate(80, 360)">
    <rect x="0" y="0" width="1120" height="240" rx="16" fill="#f8fafc" stroke="#e2e8f0" stroke-width="2"/>
    
    <text x="560" y="50" text-anchor="middle" fill="#1f2937" font-family="Microsoft YaHei, sans-serif" font-size="24" font-weight="bold">
      2026 年关键指标预测
    </text>
    
    <!-- Stat 1 -->
    <circle cx="200" cy="130" r="50" fill="#0066cc" opacity="0.1"/>
    <text x="200" y="125" text-anchor="middle" fill="#0066cc" font-family="Microsoft YaHei, sans-serif" font-size="32" font-weight="bold">70%</text>
    <text x="200" y="155" text-anchor="middle" fill="#6b7280" font-family="Microsoft YaHei, sans-serif" font-size="14">企业采用小型模型</text>
    
    <!-- Stat 2 -->
    <circle cx="560" cy="130" r="50" fill="#00d4ff" opacity="0.1"/>
    <text x="560" y="125" text-anchor="middle" fill="#0066cc" font-family="Microsoft YaHei, sans-serif" font-size="32" font-weight="bold">50+</text>
    <text x="560" y="155" text-anchor="middle" fill="#6b7280" font-family="Microsoft YaHei, sans-serif" font-size="14">领域专用模型数量</text>
    
    <!-- Stat 3 -->
    <circle cx="920" cy="130" r="50" fill="#1a1a2e" opacity="0.1"/>
    <text x="920" y="125" text-anchor="middle" fill="#1a1a2e" font-family="Microsoft YaHei, sans-serif" font-size="32" font-weight="bold">3x</text>
    <text x="920" y="155" text-anchor="middle" fill="#6b7280" font-family="Microsoft YaHei, sans-serif" font-size="14">推理速度提升</text>
  </g>
  
  <!-- Page Number -->
  <text x="1200" y="700" text-anchor="end" fill="#9ca3af" font-family="Microsoft YaHei, sans-serif" font-size="14">3 / 10</text>
</svg>
