<svg viewBox="0 0 1280 720" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a5f;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f172a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0066cc;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1280" height="720" fill="url(#bgGradient)"/>
  
  <!-- Grid Pattern -->
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ffffff" stroke-width="0.3" opacity="0.1"/>
    </pattern>
  </defs>
  <rect width="1280" height="720" fill="url(#grid)"/>
  
  <!-- Main Title -->
  <text x="640" y="280" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="64" font-weight="bold" fill="#ffffff">
    感谢聆听
  </text>
  
  <!-- Subtitle -->
  <text x="640" y="340" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" fill="#94a3b8">
    THANK YOU FOR YOUR ATTENTION
  </text>
  
  <!-- Accent Line -->
  <rect x="440" y="370" width="400" height="4" rx="2" fill="url(#accentGradient)"/>
  
  <!-- Contact Info -->
  <g transform="translate(640, 450)">
    <text x="0" y="0" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="22" fill="#ffffff">
      Q & A
    </text>
    <text x="0" y="40" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#94a3b8">
      欢迎提问与交流
    </text>
  </g>
  
  <!-- Footer -->
  <g transform="translate(640, 620)">
    <text x="0" y="0" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#64748b">
      2026 AI Development Trends
    </text>
    <text x="0" y="25" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#475569">
      © 2026 All Rights Reserved
    </text>
  </g>
  
  <!-- Corner Decorations -->
  <rect x="0" y="0" width="200" height="200" fill="url(#accentGradient)" opacity="0.1"/>
  <rect x="1080" y="520" width="200" height="200" fill="url(#accentGradient)" opacity="0.1"/>
</svg>
