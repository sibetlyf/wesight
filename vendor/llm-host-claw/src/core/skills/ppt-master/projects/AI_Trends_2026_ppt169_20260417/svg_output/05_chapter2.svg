<svg viewBox="0 0 1280 720" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a5f;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f172a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0066cc;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1280" height="720" fill="url(#bgGradient)"/>
  
  <!-- Header -->
  <rect x="0" y="0" width="1280" height="80" fill="#0f172a"/>
  <text x="60" y="52" font-family="Microsoft YaHei, Arial, sans-serif" font-size="28" fill="#ffffff" font-weight="500">
    2026 AI Development Trends
  </text>
  
  <!-- Chapter Number -->
  <text x="640" y="180" text-anchor="middle" font-family="Arial, sans-serif" font-size="120" font-weight="bold" fill="#1e3a5f" opacity="0.3">02</text>
  
  <!-- Title -->
  <text x="640" y="240" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="48" font-weight="bold" fill="#ffffff">
    多模态 AI 应用
  </text>
  <text x="640" y="290" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" fill="#94a3b8">
    Multimodal AI Applications
  </text>
  
  <!-- Accent Line -->
  <rect x="440" y="320" width="400" height="4" rx="2" fill="url(#accentGradient)"/>
  
  <!-- Key Points -->
  <g transform="translate(200, 380)">
    <rect x="0" y="0" width="880" height="260" rx="12" fill="#ffffff" opacity="0.05"/>
    
    <!-- Point 1 -->
    <circle cx="80" cy="70" r="20" fill="none" stroke="url(#accentGradient)" stroke-width="3"/>
    <text x="80" y="78" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#00d4ff">1</text>
    <text x="120" y="60" font-family="Microsoft YaHei, Arial, sans-serif" font-size="24" font-weight="bold" fill="#ffffff">文本 + 图像 + 音频</text>
    <text x="120" y="95" font-family="Arial, sans-serif" font-size="16" fill="#94a3b8">Seamless text, image, audio integration</text>
    
    <!-- Point 2 -->
    <circle cx="80" cy="160" r="20" fill="none" stroke="url(#accentGradient)" stroke-width="3"/>
    <text x="80" y="168" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#00d4ff">2</text>
    <text x="120" y="150" font-family="Microsoft YaHei, Arial, sans-serif" font-size="24" font-weight="bold" fill="#ffffff">实时视频理解</text>
    <text x="120" y="185" font-family="Arial, sans-serif" font-size="16" fill="#94a3b8">Real-time video understanding & analysis</text>
    
    <!-- Point 3 -->
    <circle cx="80" cy="250" r="20" fill="none" stroke="url(#accentGradient)" stroke-width="3"/>
    <text x="80" y="258" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#00d4ff">3</text>
    <text x="120" y="240" font-family="Microsoft YaHei, Arial, sans-serif" font-size="24" font-weight="bold" fill="#ffffff">企业级应用场景</text>
    <text x="120" y="275" font-family="Arial, sans-serif" font-size="16" fill="#94a3b8">Enterprise multimodal workflows</text>
  </g>
  
  <!-- Page Number -->
  <text x="1220" y="700" text-anchor="end" font-family="Arial, sans-serif" font-size="14" fill="#64748b">5 / 10</text>
</svg>
